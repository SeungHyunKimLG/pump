name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy
        env:
          FIREBASE_TOKEN: "${{ secrets.FIREBASE_TOKEN }}"
        run: firebase deploy --only hosting,firestore:rules --project pump-management-99364 --token "$FIREBASE_TOKEN" --non-interactive
